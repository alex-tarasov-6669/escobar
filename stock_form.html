<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Залишки Escobar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, system-ui;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 10px;
        }

        .section {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 14px;
            color: var(--tg-theme-button-color);
            text-transform: uppercase;
            margin: 0 0 12px 0;
        }

        .item {
            margin-bottom: 15px;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .item-name span {
            color: #ff0000;
            font-weight: bold;
            margin-left: 5px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .choice-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #eee;
        }

        .choice-btn.active {
            background: var(--tg-theme-button-color);
            color: white;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-input {
            flex: 1;
        }

        .slider-value {
            min-width: 70px;
            text-align: right;
            font-weight: bold;
        }

        .slider-hint {
            font-size: 12px;
            opacity: 0.7;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="form-container"></div>
<button class="submit-btn" onclick="submitData()">ВВЕСТИ ЗАЛИШКИ</button>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

const sliderConfigs = {
    "Сир Голандский": {min:0,max:4,step:1,label:v=>v+" шт", val:v=>String(v), s:v=>v<2?0:v<3?1:2},
    "Аджика": {min:0,max:9,step:1,label:v=>v+" шт", val:v=>String(v), s:v=>v<5?0:v<8?1:2},
    "Сир ФЕТА": {min:0,max:3,step:0.5,label:v=>v+" шт", val:v=>String(v), s:v=>v<1.5?0:v<2?1:2},

    "Курка": {min:0,max:100,step:20,label:v=>v+" порц", val:v=>String(v), s:v=>v<70?0:v<100?1:2},
    "Телятина": {min:0,max:12,step:2,label:v=>v+" порц", val:v=>String(v), s:v=>v<8?0:v<10?1:2},
    "Свинина": {min:0,max:12,step:2,label:v=>v+" порц", val:v=>String(v), s:v=>v<8?0:v<10?1:2},
    "ЛОСОСЬ": {min:0,max:3,step:1,label:v=>v+" кус", val:v=>String(v), s:v=>v<1.5?0:v<2?1:2},
    "КРЕВЕТКА": {min:0,max:16,step:2,label:v=>v+" порц", val:v=>String(v), s:v=>v<10?0:v<15?1:2},

    "Лаваш чорний": {min:0,max:4,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<2?0:v<3?1:2},

    // Канский фестиваль
    "Маринований огірок": {min:0,max:1000,step:100,label:v=>v+" г", val:v=>String(v), s:v=>v<400?0:v<600?1:2},
    "Лаваш жовтий": {min:0,max:3,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<1?0:v<2?1:2},
    "Шаучак": {min:0,max:6,step:1,label:v=>v+" порц", val:v=>String(v), s:v=>v<3?0:v<5?1:2},
    "Картошка різ": {min:0,max:4,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<2?0:v<3?1:2},
    "Морква корейська": {min:0,max:500,step:100,label:v=>v+" г", val:v=>String(v/1000), s:v=>v<200?0:v<300?1:2},
    "Сулугуни": {min:0,max:4,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<2?0:v<3?1:2},
    "Салфетки": {min:0,max:5,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<2?0:v<4?1:2},
    "Перчатки одн.": {min:0,max:5,step:1,label:v=>v+" уп", val:v=>String(v), s:v=>v<2?0:v<4?1:2},
    "Кетчуп": {min:0,max:2,step:0.5,label:v=>v+" б", val:v=>String(v), s:v=>v<1?0:v<1.5?1:2},
    "Олія": {min:0,max:20,step:2,label:v=>v+" л", val:v=>String(v), s:v=>v<10?0:v<15?1:2}
};

const schema = [
    {title:"ОПТОВИЙ РИНОК", items:["Сир Голандский","Аджика","Сир ФЕТА"]},
    {title:"М'ЯСО / ПОРЦІЇ", items:["Курка","Телятина","Свинина","ЛОСОСЬ","КРЕВЕТКА"]},
    {title:"НОВА ПОШТА / ЛАВАШ", items:["Лаваш чорний"]},
    {title:"КАНСКИЙ ФЕСТИВАЛЬ", items:["Маринований огірок","Лаваш жовтий","Шаучак","Картошка різ","Морква корейська","Сулугуни","Салфетки","Перчатки одн.","Кетчуп","Олія"]}
];

const container = document.getElementById('form-container');

function renderSlider(name){
    const c=sliderConfigs[name];
    return `
    <div class="slider-row">
        <input type="range" class="slider-input" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.min}" oninput="updateSlider(this)">
        <div class="slider-value">${c.label(c.min)}</div>
    </div>
    <div class="slider-hint">0 = фактичний залишок 0</div>
    `;
}

schema.forEach(sec=>{
    let div=document.createElement('div');
    div.className='section';
    let html=`<h2>${sec.title}</h2>`;
    sec.items.forEach(name=>{
        html+=`
        <div class="item" data-name="${name}">
            <span class="item-name">${name}</span>
            ${renderSlider(name)}
        </div>`;
    });
    div.innerHTML=html;
    container.appendChild(div);
});

function updateSlider(input){
    const item=input.closest('.item');
    const cfg=sliderConfigs[item.dataset.name];
    const v=parseFloat(input.value);
    item.querySelector('.slider-value').innerText=cfg.label(v);
}

function submitData(){
    let res={};
    document.querySelectorAll('.item').forEach(it=>{
        const name=it.dataset.name;
        const cfg=sliderConfigs[name];
        const val=parseFloat(it.querySelector('.slider-input').value);

        res[name]={
            v: cfg.val(val),
            s: cfg.s(val)
        };
    });

    tg.sendData(JSON.stringify(res));
    tg.close();
}
</script>

</body>
</html>
